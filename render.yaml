services:
  - type: worker
    name: agp-zakupki-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ALLOWED_CHAT_ID
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CREDS_JSON
        value: credentials.json
